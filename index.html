<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NAMIKIRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-slate-950 text-white font-[Poppins] overflow-x-hidden">


<!-- ================= NAVBAR ================= -->

<nav class="fixed top-0 left-0 w-full z-50 backdrop-blur-lg bg-white/5 border-b border-white/10">

<div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-5">

<a href="#" class="text-2xl font-bold tracking-widest">

NAMIKIRO

</a>

<ul class="hidden md:flex gap-10 text-lg">

<li><a href="#">Home</a></li>

<li><a href="#">Portfolio</a></li>

<li><a href="#">Sketch</a></li>

<li><a href="#">Contact</a></li>

</ul>


<button id="menuBtn" class="md:hidden text-3xl">

☰

</button>

</div>

</nav>



<!-- Overlay -->

<div id="overlay"
class="fixed inset-0 bg-black/70 hidden z-40">

</div>


<!-- Mobile Menu -->

<div id="mobileMenu"

class="fixed top-0 right-[-100%] w-[40%] h-screen bg-slate-900 z-50 duration-500">

<div class="pt-28 pl-8 flex flex-col gap-8 text-xl">

<a href="#">Home</a>

<a href="#">Portfolio</a>

<a href="#">Sketch</a>

<a href="#">Contact</a>

</div>

</div>





<!-- HERO -->

<section class="relative h-screen flex items-center justify-center overflow-hidden">

    <!-- Background Image -->
    <img
    id="heroImage"
    src="assets/home/developer.png"
    class="absolute inset-0 w-full h-full object-cover transition-opacity duration-700"
    >

    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- Content -->
    <div class="relative z-10 max-w-5xl mx-auto px-8 text-center">

        <h2 class="text-2xl text-white mb-4">
            Hi,
        </h2>

        <h1 class="text-6xl md:text-8xl font-bold text-white mb-4">
            I'm
        </h1>

        <h2
        id="changingText"
        class="text-5xl md:text-7xl font-bold text-cyan-400 transition-all duration-500"
        >
            Developer
        </h2>

        <p class="mt-8 text-gray-200 text-lg max-w-2xl mx-auto">
            Game Developer, Technical Artist,
            3D Designer and Creative Problem Solver.
        </p>

        <div class="flex flex-wrap justify-center gap-5 mt-10">

            <button class="px-8 py-4 bg-cyan-500 rounded-xl hover:bg-cyan-600 transition">
                View Portfolio
            </button>

            <button class="px-8 py-4 border border-cyan-500 text-white rounded-xl hover:bg-cyan-500 transition">
                Contact Me
            </button>

        </div>

    </div>

</section>


<script src="script.js"></script>

</body>

</html>
